name: Build Signed Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Check for Keystore Secret
      id: check_keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ENCODED_KEYSTORE" ]; then
          echo "has_keystore=true" >> $GITHUB_OUTPUT
          echo "找到签名密钥，将构建签名版本"
        else
          echo "has_keystore=false" >> $GITHUB_OUTPUT
          echo "未找到签名密钥，将构建 Debug 版本"
        fi
      
    - name: Decode Keystore
      if: steps.check_keystore.outputs.has_keystore == 'true'
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$ENCODED_KEYSTORE" | base64 -d > app/release.keystore
        echo "密钥库已创建"
      
    - name: Build Signed Release APK
      if: steps.check_keystore.outputs.has_keystore == 'true'
      env:
        KEYSTORE_FILE: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew clean assembleRelease
        ls -la app/build/outputs/apk/release/
      
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      if: steps.check_keystore.outputs.has_keystore == 'true'
      with:
        name: ZhuandanScore-v1.0.0-signed
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
        
    - name: Build Debug APK
      if: steps.check_keystore.outputs.has_keystore == 'false'
      run: |
        ./gradlew clean assembleDebug
        ls -la app/build/outputs/apk/debug/
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: steps.check_keystore.outputs.has_keystore == 'false'
      with:
        name: ZhuandanScore-v1.0.0-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
